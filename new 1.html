<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUJIWA Việt Nam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>FUJIWA Việt Nam</h1>
    <p>Nước ion kiềm chuẩn Nhật Bản</p>
</header>

<section class="banner">
    <img src="images/banner.jpg" alt="Banner Fujiwa">
</section>

<section class="about">
    <h2>Giới thiệu</h2>
    <p>
        FUJIWA là thương hiệu nước ion kiềm cao cấp với công nghệ Nhật Bản,
        mang đến nguồn nước tốt cho sức khỏe.
    </p>
</section>

<section class="products">
    <h2>Sản phẩm nổi bật</h2>

    <div class="card">
        <img src="images/product1.png" alt="Fujiwa">
        <h3>Nước ion kiềm Fujiwa</h3>
        <p>Giàu Hydrogen, hỗ trợ sức khỏe.</p>
    </div>
</section>

<section class="contact">
    <h2>Liên hệ</h2>
    <form>
        <input type="text" placeholder="Họ và tên">
        <input type="email" placeholder="Email">
        <textarea placeholder="Nội dung"></textarea>
        <button type="submit">Gửi</button>
    </form>
</section>

<footer>
    <p>© 2026 FUJIWA Việt Nam</p>
</footer>

<script src="script.js"></script>
</body>
</html>
